<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác thực tài khoản</title>
    <style>
        body {{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            padding: 20px;
        }}

        .container {{
            max-width: 600px;
            margin: auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }}

        .button {{
            display: inline-block;
            padding: 12px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }}

        .footer {{
            font-size: 12px;
            color: #888;
            margin-top: 30px;
        }}
    </style>
</head>
<body>
    <div class="container">
        <h2>Xác thực tài khoản của bạn</h2>
        <p>Chào <strong>{0}</strong>,</p>
        <p>Cảm ơn bạn đã đăng ký tài khoản trên hệ thống của chúng tôi.</p>
        <p>Vui lòng bấm vào nút bên dưới để xác nhận email và kích hoạt tài khoản:</p>

        <a href="{1}" class="button">Xác thực email</a>

        <p>Nếu bạn không đăng ký tài khoản, bạn có thể bỏ qua email này.</p>

        <div class="footer">
            © 2025 WebJobs. All rights reserved.
        </div>
    </div>
</body>
</html>
